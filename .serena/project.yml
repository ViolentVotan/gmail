# Serif — macOS Gmail Client
project_name: "gmail"

# Swift via sourcekit-lsp (available at /usr/bin/sourcekit-lsp)
languages:
- swift

encoding: "utf-8"

# LSP backend (inherited from global, explicit for clarity)
language_backend: LSP

# Honor .gitignore
ignore_all_files_in_gitignore: true

# Additional paths to ignore
ignored_paths:
- ".build/**"
- "DerivedData/**"
- "*.xcodeproj/**"
- "*.xcworkspace/**"
- "xcuserdata/**"
- ".xcodebuildmcp/**"
- "Serif/Resources/Fonts/**"
- "Serif/Resources/Assets.xcassets/**"
- "docs/appcast.xml"
- "assets/**"

read_only: false

excluded_tools: []
included_optional_tools: []
fixed_tools: []

# Inherit from global (interactive + editing)
base_modes:
default_modes:

# Context for LLM on project activation
initial_prompt: "Swift/SwiftUI macOS Gmail client (Serif). MVVM: Services → ViewModels → Views.
  Read code_style memory before editing Swift code. Multi-account: all persistence keyed by accountID."

symbol_info_budget:

read_only_memory_patterns: []

line_ending:
