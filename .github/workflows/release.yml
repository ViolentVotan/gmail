name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

env:
  SCHEME: Serif
  PROJECT: Serif.xcodeproj
  APP_NAME: Serif

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Generate GoogleCredentials placeholder
        run: |
          mkdir -p Serif/Configuration
          cat > Serif/Configuration/GoogleCredentials.swift << 'CREDS_EOF'
          import Foundation
          enum GoogleCredentials {
              static let clientID     = "${{ secrets.GOOGLE_CLIENT_ID }}"
              static let clientSecret = "${{ secrets.GOOGLE_CLIENT_SECRET }}"
              static let redirectURI  = "http://localhost"
              static let scopes = [
                  "https://mail.google.com/",
                  "https://www.googleapis.com/auth/userinfo.email",
                  "https://www.googleapis.com/auth/userinfo.profile",
                  "https://www.googleapis.com/auth/contacts.readonly",
                  "https://www.googleapis.com/auth/contacts.other.readonly"
              ]
          }
          CREDS_EOF

      - name: Install Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          # Decode certificate
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

      - name: Resolve SPM dependencies
        run: xcodebuild -project $PROJECT -scheme $SCHEME -resolvePackageDependencies

      - name: Build archive
        run: |
          xcodebuild archive \
            -project $PROJECT \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath build/Serif.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Prepare app for DMG
        run: |
          mkdir -p build/export
          cp -R "build/Serif.xcarchive/Products/Applications/$APP_NAME.app" "build/export/$APP_NAME.app"

      - name: Notarize
        run: |
          # Zip the app for notarization
          ditto -c -k --keepParent "build/export/$APP_NAME.app" "build/export/$APP_NAME.zip"

          # Submit for notarization and wait
          SUBMIT_OUTPUT=$(xcrun notarytool submit "build/export/$APP_NAME.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization was accepted
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted! Stapling ticket..."
            xcrun stapler staple "build/export/$APP_NAME.app"
          else
            echo "Notarization failed. Fetching detailed logs..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              developer_log.json || true
            cat developer_log.json || true
            exit 1
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          ICON_FILE=$(find "build/export/$APP_NAME.app/Contents/Resources" -name "*.icns" | head -1)
          VOLICON_FLAG=""
          if [ -n "$ICON_FILE" ]; then
            VOLICON_FLAG="--volicon $ICON_FILE"
          fi
          create-dmg \
            --volname "$APP_NAME" \
            $VOLICON_FLAG \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 150 185 \
            --app-drop-link 450 185 \
            "build/$APP_NAME-${TAG}.dmg" \
            "build/export/$APP_NAME.app"

      - name: Create tag if workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "$TAG" \
            "build/$APP_NAME-${TAG}.dmg" \
            --title "$APP_NAME $VERSION" \
            --generate-notes

      - name: Generate appcast.xml
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_FILE="build/$APP_NAME-${TAG}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_FILE")
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${APP_NAME}-${TAG}.dmg"
          PUB_DATE=$(date -R)

          cat > docs/appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Serif Updates</title>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <enclosure url="${DMG_URL}" length="${DMG_SIZE}" type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Deploy appcast to GitHub Pages
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast for ${TAG}" || true
          git push origin HEAD:master

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f "$RUNNER_TEMP/certificate.p12"
